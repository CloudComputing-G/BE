server {
    listen 80;
    server_name checkmate-g.store;
    return 301 https://$host$request_uri; # HTTP로 오면 HTTPS로 리다이렉트
}

server {
    listen 443 ssl;
    server_name checkmate-g.store;

    ssl_certificate /etc/letsencrypt/live/checkmate-g.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/checkmate-g.store/privkey.pem;

    location / {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
    }
}